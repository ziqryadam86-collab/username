<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Stream Redirect</title>
</head>
<body>
    <div id="status" style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px;">
        <h3>Sedang memproses siaran...</h3>
    </div>

    <script>
        // 1. Ambil data parameter dari URL GitHub anda
        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user');
        const pass = urlParams.get('pass');
        const codeuser = urlParams.get('codeuser');
        const code = urlParams.get('code');

        // 2. Semakan keselamatan (Hanya 'adamuser' dan password '860821' sahaja dibenarkan)
        if (user === "adamuser" && pass === "860821") {
            
            // Logik: Jika codeuser adalah 'astroawani', kita hantar ke link CloudFront tadi
            if (codeuser === "astroawani") {
                
                const urlM3U8Sebenar = "https://d2idp3hzkhjpih.cloudfront.net/out/v1/4b85d9c2bf97413eb0c9fd875599b837/index_3.m3u8";
                
                // Terus redirect ke link asal tanpa kantong fail .m3u8 di URL GitHub
                window.location.href = urlM3U8Sebenar;
                
            } else {
                document.getElementById("status").innerHTML = "<h3 style='color: red;'>Ralat: Saluran tidak ditemui!</h3>";
            }

        } else {
            // Jika username atau password salah
            document.getElementById("status").innerHTML = `
                <h3 style="color: red;">Ralat: Akses Ditolak!</h3>
                <p>Username atau Password salah atau tidak sah.</p>
            `;
        }
    </script>
</body>
</html>
